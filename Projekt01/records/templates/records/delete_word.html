{% extends 'layout.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger shadow-sm mt-5">
            <div class="card-header bg-danger text-white">
                <h3 class="mb-0">Confirm Deletion</h3>
            </div>
            <div class="card-body text-center py-5">
                <p class="fs-4">Are you sure you want to delete the word <strong>"{{ word.term }}"</strong>?</p>
                <p class="text-muted">This action cannot be undone and will delete all associated definitions and comments.</p>
                
                <form method="POST" class="mt-4">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger btn-lg px-4">Yes, Delete</button>
                    <a href="{% url 'word_detail' word.pk %}" class="btn btn-secondary btn-lg px-4 ms-2">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
