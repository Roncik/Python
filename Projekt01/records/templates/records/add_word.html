{% extends 'layout.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm mb-4">
            <div class="card-header bg-white">
                <h2 class="mb-0">Add a New Word</h2>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    
                    <h4 class="mt-2">Word Details</h4>
                    {{ word_form.as_p }}
                    
                    <hr class="my-4">
                    
                    <h4>Initial Definition</h4>
                    <p class="text-muted small">Provide the first definition for this word.</p>
                    {{ def_form.as_p }}
                    
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">Submit Word</button>
                        <a href="{% url 'word_list' %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
