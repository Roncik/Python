{% extends 'layout.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Dictionary Entries</h2>
    {% if user.is_authenticated %}
        <a href="{% url 'add_word' %}" class="btn btn-success">Add New Word</a>
    {% endif %}
</div>
<div class="list-group shadow-sm">
    {% for word in words %}
        <a href="{% url 'word_detail' word.pk %}" class="list-group-item list-group-item-action">
            <h5 class="mb-1">{{ word.term }}</h5>
            <small class="text-muted">Added: {{ word.created_at|date:"F d, Y" }}</small>
        </a>
    {% empty %}
        <p>No words added yet. Be the first!</p>
    {% endfor %}
</div>
{% endblock %}
